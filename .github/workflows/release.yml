# Publishes the `decklight` package to npm via Trusted Publishing (OIDC) — no
# tokens anywhere. Bump the version in package.json, commit, then push a
# matching tag (e.g. v0.2.0); CI builds, tests, and publishes with provenance.
#
# The trust relationship lives on npmjs.com, not here: package → Settings →
# Trusted Publisher, pinned to decklight/decklight and this workflow file
# (release.yml). Nothing secret is stored in the repo.
name: release to npm

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # required for npm Trusted Publishing (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # NO registry-url. setup-node's registry-url writes an .npmrc auth entry
      # fed by $NODE_AUTH_TOKEN and exports a literal XXXXX placeholder for it —
      # and a configured token pre-empts the Trusted Publishing OIDC exchange, so
      # v0.2.0's first publish went out authenticated as "XXXXX-XXXXX-XXXXX-XXXXX"
      # and died with a misleading E404. With no token configured, npm >= 11.5
      # performs the OIDC exchange against the trusted publisher registered on
      # npmjs.com (decklight/decklight, release.yml) — and if that registration
      # is missing, it fails with an honest auth error instead.
      - uses: actions/setup-node@v4
        with:
          node-version: 24

      # Trusted Publishing needs npm >= 11.5.1; pin the 11.x line (npm@latest
      # is now 12.x, which requires a newer Node than the runner ships)
      - run: npm install -g npm@11

      # node-pty (optional dep) is CLI-recording only — skip its native build
      - run: npm ci --omit=optional

      - run: node build.mjs
      - run: npm test

      # a tag push must match the version we're about to publish
      - name: verify tag matches package.json
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          pkg="$(node -p "require('./package.json').version")"
          tag="${GITHUB_REF_NAME#v}"
          if [ "$pkg" != "$tag" ]; then
            echo "tag $tag does not match package.json version $pkg" >&2
            exit 1
          fi
          echo "publishing decklight@$pkg"

      - run: npm publish
