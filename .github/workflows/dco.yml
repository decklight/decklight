name: DCO

on:
  pull_request:

permissions:
  contents: read

jobs:
  dco:
    name: Check sign-offs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify every commit has a matching Signed-off-by
        run: |
          set -euo pipefail
          base="origin/${{ github.base_ref }}"
          failed=0
          while read -r sha; do
            author_name=$(git log -1 --format='%an' "$sha")
            author_email=$(git log -1 --format='%ae' "$sha")
            expected="Signed-off-by: ${author_name} <${author_email}>"
            if ! git log -1 --format='%B' "$sha" | grep -qiF "$expected"; then
              echo "::error::Commit ${sha} is missing \"${expected}\""
              failed=1
            fi
          done < <(git rev-list --no-merges "${base}..HEAD")
          if [ "$failed" -ne 0 ]; then
            echo ""
            echo "Every commit must be signed off (git commit -s)."
            echo "See CONTRIBUTING.md for how to fix missing sign-offs."
            exit 1
          fi
          echo "All commits are signed off."
