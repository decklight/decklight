# Publishes decklight.io: every push to main rebuilds the runtime, bundles
# demo/showcase.html with every theme into ONE self-contained file, and
# deploys it to decklight/decklight.github.io (GitHub Pages behind the
# custom domain). Auth is a write-only deploy key on the site repo, stored
# here as the SITE_DEPLOY_KEY Actions secret.
name: publish decklight.io

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # node-pty (optional dep) is CLI-recording only — skip its native build
      - run: npm ci --omit=optional

      - run: node build.mjs

      - name: assemble the site
        run: |
          mkdir -p out
          cp site/index.html out/index.html
          mkdir -p out/dist
          cp dist/decklight.js dist/decklight.css out/dist/
          node cli/decklight.mjs bundle demo/showcase.html --themes all -o out/showcase.html
          # the site's showcase gets the demo voice tracks (audio lives only
          # in the site repo; keep_files below preserves it across deploys)
          node -e '
            const fs = require("fs");
            const cfg = JSON.parse(fs.readFileSync("site/voices.json", "utf8"));
            const files = cfg.voices.map(v => `{ label: ${JSON.stringify(v.label)}, dir: ${JSON.stringify(v.dir)} }`).join(", ");
            const p = "out/showcase.html";
            const h = fs.readFileSync(p, "utf8");
            const out = h.replace("Decklight.init({", `Decklight.init({\n    narration: { files: [${files}] },`);
            if (out === h) throw new Error("init config anchor not found");
            fs.writeFileSync(p, out);
            console.log("narration config injected:", cfg.voices.length, "voices");
          '
          printf 'decklight.io' > out/CNAME
          {
            echo '# decklight.io'
            echo
            echo 'Built automatically by decklight/decklight → .github/workflows/publish-site.yml —'
            echo 'the landing page (site/index.html) plus the showcase bundled to a single file.'
            echo 'Do not edit by hand.'
          } > out/README.md

      - uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.SITE_DEPLOY_KEY }}
          external_repository: decklight/decklight.github.io
          publish_branch: main
          publish_dir: ./out
          keep_files: true
          commit_message: 'publish showcase from ${{ github.sha }}'
