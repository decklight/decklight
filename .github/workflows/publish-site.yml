# Publishes decklight.io: every push to main rebuilds the runtime, bundles
# demo/showcase.html with every theme into ONE self-contained file, and
# deploys the assembled site to GitHub Pages on THIS repo (decklight.io is
# the repo's custom domain, set in Settings → Pages). Auth is the workflow's
# own OIDC token — no stored credential anywhere.
name: publish decklight.io

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# one Pages deployment at a time; never cancel one mid-flight
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # node-pty (optional dep) is CLI-recording only — skip its native build
      - run: npm ci --omit=optional

      - run: node build.mjs

      - name: assemble the site
        run: |
          mkdir -p out/dist out/themes
          cp site/index.html out/index.html
          # the issue triage board — reads the GitHub API live, no build step
          cp site/triage.html out/triage.html
          cp dist/decklight.js dist/decklight.css out/dist/
          # the paper-planes decks the landing page embeds: the bundled one is
          # vendored in site/ (its source lives nowhere else); the starter one
          # loads dist/ and themes/paper.css relative to the site root
          cp site/paper-planes.html site/paper-planes-start.html out/
          cp themes/paper.css themes/meadow.css out/themes/
          # demo voice tracks for the showcase (see site/voices.json)
          cp -r site/voices out/voices
          node cli/decklight.mjs bundle demo/showcase.html --themes all -o out/showcase.html
          node -e '
            const fs = require("fs");
            const cfg = JSON.parse(fs.readFileSync("site/voices.json", "utf8"));
            const files = cfg.voices.map(v => `{ label: ${JSON.stringify(v.label)}, dir: ${JSON.stringify(v.dir)} }`).join(", ");
            const p = "out/showcase.html";
            const h = fs.readFileSync(p, "utf8");
            const out = h.replace("Decklight.init({", `Decklight.init({\n    narration: { files: [${files}] },`);
            if (out === h) throw new Error("init config anchor not found");
            fs.writeFileSync(p, out);
            console.log("narration config injected:", cfg.voices.length, "voices");
          '

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

      - id: deployment
        uses: actions/deploy-pages@v4
