# The ready-to-dev loop.
#
#   label an issue `ready-to-dev`  →  Claude implements it on a branch
#                                  →  npm test + npm run verify must pass
#                                  →  the feature is EXERCISED in a browser and
#                                     screenshotted
#                                  →  a PR opens with those screenshots inline,
#                                     opened as the PO (see below) or, failing
#                                     that, as the bot with his review requested
#                                  →  auto-merge is armed: the PR merges on its own
#                                     once CI goes green. @gphilipp reviews the
#                                     screenshots, not the merge button.
#
# The screenshots are the point. A green suite says "the code does what its tests
# say"; only a picture says "the thing the ticket asked for is actually there".
# They are pushed to an orphan `shots` branch (evidence, never source) so the PR
# body can render them without an artifact download.
#
# WHY THE PR IS OPENED WITH A PAT. GitHub will not start a workflow from an
# event its own GITHUB_TOKEN caused — so a PR this loop opened got no CI at all,
# auto-merge sat waiting on a green that could never arrive, and a human had to
# close and reopen the PR to wake it up. The documented way out is to open it as
# a real user: `CI_NUDGE_PAT` (Contents + Pull requests: write, this repo only).
# Without the secret the loop still works exactly as before, close/reopen and
# all — the PR comment says so rather than leaving you to wonder.
name: ready-to-dev

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue:
        description: issue number to implement
        required: true

permissions:
  contents: write
  pull-requests: write
  issues: write
  # the action exchanges an OIDC token even when it authenticates with an API key;
  # without this it dies before it ever reads the prompt:
  #   "Could not fetch an OIDC token. Did you remember to add id-token: write?"
  id-token: write
  actions: read

concurrency:
  group: ready-to-dev-${{ github.event.issue.number || inputs.issue }}
  cancel-in-progress: false # never kill a half-finished implementation

jobs:
  implement:
    if: github.event_name == 'workflow_dispatch' || github.event.label.name == 'ready-to-dev'
    name: implement, prove, hand to the PO
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # the DCO check reads history; so does a rebase

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci --omit=optional

      - uses: browser-actions/setup-chrome@v2
        id: chrome
        with:
          chrome-version: stable

      - name: the ticket
        id: ticket
        env:
          GH_TOKEN: ${{ github.token }}
          N: ${{ github.event.issue.number || inputs.issue }}
        run: |
          set -euo pipefail
          echo "number=$N" >> "$GITHUB_OUTPUT"
          echo "branch=ticket/$N" >> "$GITHUB_OUTPUT"
          gh issue view "$N" --json title,body,labels > /tmp/ticket.json
          # A RANDOM delimiter, because the report is untrusted: a fixed one
          # can be closed early by a body that simply contains that line, and
          # everything after it becomes step outputs of the author's choosing.
          delim="TICKET_EOF_$(openssl rand -hex 16)"
          {
            echo "body<<$delim"
            jq -r '"# " + .title + "\n\n" + (.body // "(no description)")' /tmp/ticket.json
            echo "$delim"
          } >> "$GITHUB_OUTPUT"
          gh issue edit "$N" --add-label in-dev --remove-label ready-to-dev || true

      - name: implement it
        uses: anthropics/claude-code-action@v1
        env:
          CHROME: ${{ steps.chrome.outputs.chrome-path }}
        with:
          # A subscription token, not a metered API key. The loop's first two runs
          # died on a prepaid balance: one burned $1.26 and stopped mid-ticket at
          # turn 16 of 80, the next was refused on its very first call having spent
          # nothing — a credit ceiling wearing the costume of a bug, since the
          # action reports `is_error: true` with no message at all.
          # Minted by `claude setup-token`; only ONE credential may be set here,
          # because ANTHROPIC_API_KEY in the environment takes precedence and a
          # dead key left alongside this one would quietly keep being used.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model claude-fable-5
            --max-turns 80
            --allowedTools Bash,Read,Edit,Write,Glob,Grep
          prompt: |
            You are implementing issue #${{ steps.ticket.outputs.number }} in the decklight repository.

            THE TICKET
            ${{ steps.ticket.outputs.body }}

            Read SPEC.md and CONTRIBUTING.md first — SPEC.md is the contract this
            library keeps, and a change that contradicts it is a change to it: update
            the SPEC in the same commit, or do not make the change.

            WHAT "DONE" MEANS HERE. All four, or the PR is not worth opening:

            1. It works. `npm test` and `npm run verify` both pass. verify drives a
               real headless browser; CHROME is already set for you.

            2. It is tested. A behaviour worth shipping is worth a test that FAILS
               without your change — write it, then check it discriminates by
               reverting your fix and watching it go red. A test that passes either
               way is worse than no test: it is a lie that costs nothing to keep.

            3. It is SEEN. Produce at least one screenshot that shows the feature
               actually working, into .shots/ :

                 node tools/shot.mjs demo/showcase.html -o .shots/<name>.png \
                   --drive shots/<name>.mjs --wait 3000

               --drive runs a snippet inside the page after the deck boots, so you
               can exercise the feature exactly as a presenter would (`press('v')`,
               `await sleep(300)`, `window.__deck`). Commit the driver under shots/
               so the reviewer can see HOW it was exercised, not just the result.
               If the ticket changes nothing visible, screenshot the surface it does
               touch and say so in the PR.

            4. It is honest. If you could not do part of it, say so in the PR body
               under "What I did not do". Do not quietly narrow the ticket.

            COMMITS. This repo enforces the DCO: every commit needs a Signed-off-by
            line matching its author exactly, or CI rejects the PR.

              git config user.name  "claude[bot]"
              git config user.email "claude[bot]@users.noreply.github.com"
              git checkout -b ${{ steps.ticket.outputs.branch }}
              git commit -s -m "..."           # -s is not optional

            Write the message for whoever reads it in a year: what changed, and why
            it had to. Close with:

              Co-Authored-By: Claude Fable 5 <noreply@anthropic.com>

            Then push the branch. Do NOT open the pull request yourself and do NOT
            merge anything — the next step opens the PR with your screenshots
            attached, and a human decides whether it ships.

      - name: publish the screenshots
        id: shots
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          N: ${{ steps.ticket.outputs.number }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          pngs=(.shots/*.png)
          if [ ${#pngs[@]} -eq 0 ]; then
            echo "none=1" >> "$GITHUB_OUTPUT"
            echo "::warning::no screenshots were produced — the PO gets no picture to look at"
            exit 0
          fi
          # An orphan branch: evidence, not source. It never merges into main, so a
          # year of PNGs cannot bloat the history everyone else clones.
          tmp=$(mktemp -d)
          url="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          if git clone --quiet --depth 1 --branch shots "$url" "$tmp" 2>/dev/null; then
            :
          else
            git clone --quiet --depth 1 "$url" "$tmp"
            git -C "$tmp" checkout --quiet --orphan shots
            git -C "$tmp" rm -rqf . 2>/dev/null || true
          fi
          mkdir -p "$tmp/issue-$N"
          rm -f "$tmp/issue-$N"/*.png
          cp .shots/*.png "$tmp/issue-$N/"
          git -C "$tmp" config user.name  "claude[bot]"
          git -C "$tmp" config user.email "claude[bot]@users.noreply.github.com"
          git -C "$tmp" add -A
          git -C "$tmp" commit -qs -m "shots for #$N" || { echo "none=1" >> "$GITHUB_OUTPUT"; exit 0; }
          git -C "$tmp" push -q "$url" shots
          sha=$(git -C "$tmp" rev-parse HEAD)
          {
            echo 'md<<SHOTS_EOF'
            for f in .shots/*.png; do
              b=$(basename "$f")
              echo "### $b"
              echo "![${b}](https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${sha}/issue-${N}/${b})"
              echo
            done
            echo SHOTS_EOF
          } >> "$GITHUB_OUTPUT"

      - name: open the PR and hand it to the Product Owner
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          # A PR opened with GITHUB_TOKEN gets no CI: GitHub will not start a
          # workflow from its own token (anti-recursion), so the checks never
          # run, auto-merge waits on a green that cannot arrive, and a human
          # has to close/reopen the PR to wake it up. Opening it as a real user
          # is the documented way out. Needs `Pull requests: write` on the PAT,
          # on top of the `Contents: write` pr-fix uses — if it is missing (or
          # the secret is unset) this falls back to GITHUB_TOKEN and says so.
          NUDGE_PAT: ${{ secrets.CI_NUDGE_PAT }}
          N: ${{ steps.ticket.outputs.number }}
          BRANCH: ${{ steps.ticket.outputs.branch }}
          SHOTS: ${{ steps.shots.outputs.md }}
        run: |
          set -euo pipefail
          if ! git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            gh issue comment "$N" --body "The ready-to-dev run finished without pushing a branch — nothing to review. See the [run log](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID})."
            gh issue edit "$N" --remove-label in-dev --add-label ready-to-dev || true
            exit 1
          fi

          # written to a file, NOT an indented heredoc: leading spaces would make
          # GitHub render the whole body as a code block
          {
            echo "Implements #${N}."
            echo
            echo "## Does it actually work?"
            echo
            echo "${SHOTS:-_No screenshot was produced — ask why before approving._}"
            echo
            echo "## This PR merges itself"
            echo
            echo "Auto-merge is armed: once CI goes green, this lands without waiting"
            echo "for approval. CI proves the tests pass. It cannot prove the feature is"
            echo "the one the ticket asked for — that is still what your eyes are for."
            echo
            echo "- [ ] the screenshots above show the ticket's outcome, not a near miss"
            echo "- [ ] the tests would fail without this change"
            echo "- [ ] SPEC.md still describes what the code does"
            echo
            echo "🤖 opened by the ready-to-dev loop · implemented by Claude Code"
          } > /tmp/pr-body.md

          title=$(gh issue view "$N" --json title --jq .title)

          # Open it as the PO when we can, so CI actually fires. That makes him
          # the PR's author, and GitHub refuses to request a review from the
          # author — which is fine, a PR you opened is already in your list.
          # The GITHUB_TOKEN path keeps the review request, since there the
          # author is the bot.
          opened=""
          if [ -n "${NUDGE_PAT:-}" ]; then
            if GH_TOKEN="$NUDGE_PAT" gh pr create \
                 --base main --head "$BRANCH" \
                 --title "$title" --body-file /tmp/pr-body.md; then
              opened=pat
            else
              echo "::warning::could not open the PR with CI_NUDGE_PAT — is \`Pull requests: write\` on the token? falling back to GITHUB_TOKEN; CI will need a nudge"
            fi
          fi
          if [ -z "$opened" ]; then
            gh pr create \
              --base main --head "$BRANCH" \
              --title "$title" --body-file /tmp/pr-body.md \
              --reviewer gphilipp || \
            gh pr edit "$BRANCH" --add-reviewer gphilipp
          fi

          # The repo keeps a linear history (no merge commits), so auto-merge
          # must squash. Every PR still has to opt in — without this the PR would
          # sit green and unmerged, waiting for a click. If the branch falls
          # behind main, auto-merge updates and re-tests it before landing.
          gh pr merge "$BRANCH" --auto --squash || \
            echo "::warning::could not arm auto-merge — the PR will need a manual merge"

          if [ "$opened" = pat ]; then
            gh issue comment "$N" --body "Implemented on \`$BRANCH\` — PR open with auto-merge armed; it lands when CI goes green."
          else
            gh issue comment "$N" --body "Implemented on \`$BRANCH\` — PR open with auto-merge armed. ⚠️ It was opened with \`GITHUB_TOKEN\`, so **CI will not start on its own**: nudge it with \`gh pr close\` then \`gh pr reopen\` on the PR, or auto-merge will wait forever."
          fi
