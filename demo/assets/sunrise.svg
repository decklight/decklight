<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-label="stylized sunrise over mountain ridges">
  <!-- demo background art for the data-background-image slides — pure SVG so
       the asset stays diffable, tiny, and license-free -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2b1b4d"/>
      <stop offset="0.55" stop-color="#8f3b6e"/>
      <stop offset="0.85" stop-color="#e2704a"/>
      <stop offset="1" stop-color="#f5a15c"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffe9b8"/>
      <stop offset="0.6" stop-color="#ffca7a"/>
      <stop offset="1" stop-color="#ffca7a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#sky)"/>
  <circle cx="640" cy="470" r="230" fill="url(#sun)"/>
  <circle cx="640" cy="470" r="95" fill="#ffe3a3"/>
  <path d="M0 720 L0 520 L180 420 L340 530 L520 400 L700 545 L880 430 L1060 540 L1280 440 L1280 720 Z" fill="#3a2352" opacity="0.9"/>
  <path d="M0 720 L0 600 L220 500 L430 610 L640 505 L860 625 L1080 520 L1280 590 L1280 720 Z" fill="#241539"/>
</svg>
