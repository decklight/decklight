<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Decklight terminal player — standalone harness</title>
  <link rel="stylesheet" href="../src/terminal/terminal.css">
  <style>
    body { background: #1a1d23; color: #eee; font-family: sans-serif; padding: 2rem; max-width: 900px; margin: auto; }
    .terminal { margin: 1.5rem 0; }
    #assert { white-space: pre-wrap; background: #000; padding: 1rem; font-family: monospace; }
    /* minimal token stand-ins (normally provided by a theme) */
    :root { --term-bg: #101418; --term-fg: #e6e6e6; --term-prompt: #7ee787; --term-cursor: #aeb8c2; }
  </style>
</head>
<body>
  <h1>Terminal player harness (mock Decklight)</h1>

  <div id="t-step" class="terminal" data-cast="fixtures/smoke.cast.json" data-mode="step" data-title="step mode"></div>
  <div id="t-play" class="terminal" data-cast="fixtures/smoke.cast.json" data-mode="play" data-title="play mode"></div>
  <div id="t-missing" class="terminal" data-cast="fixtures/does-not-exist.cast.json" data-title="broken"></div>
  <div id="t-feat" class="terminal" data-cast="fixtures/features.cast.json" data-mode="step" data-poster="1" data-title="features"></div>
  <div id="t-import" class="terminal" data-cast="fixtures/import.cast" data-mode="step" data-title="asciicast import"></div>
  <div id="t-import-plain" class="terminal" data-cast="fixtures/import.cast" data-mode="play" data-title="asciicast import (play)"></div>

  <!-- A terminal that lives on a slide, so leaving the slide can be simulated
       by dropping `active` exactly as the engine does. -->
  <section id="s-slide" class="active">
    <div id="t-slide" class="terminal" data-cast="fixtures/smoke.cast.json" data-mode="step" data-title="on a slide"></div>
  </section>

  <h2>Assertions</h2>
  <pre id="assert">running…</pre>

  <script type="module">
    // Fake WebAudio, installed BEFORE the player module runs (it caches an
    // AudioContext on first keystroke). Records every source it schedules and
    // whether that source was later stopped — which is how "the key sounds
    // stop when you leave the slide" becomes an assertable fact.
    const scheduled = [];
    // NOTE: keyClick() runs inside a try/catch that swallows "no audio in this
    // environment". A param this mock forgets (Q, say) therefore does not blow
    // up loudly — it silently aborts the keystroke and the test quietly lies.
    // Every AudioParam the player touches must exist here.
    const ctxNow = () => performance.now() / 1000;
    const param = () => ({ value: 0, setValueAtTime() {}, exponentialRampToValueAtTime() {} });
    const node = (kind) => {
      const n = {
        kind, startedAt: null, stoppedAt: null,
        frequency: param(), gain: param(), Q: param(), detune: param(),
        type: '', buffer: null,
        connect() {}, disconnect() {},
        addEventListener() {},
        // lead = how far AHEAD of the audio clock this source was booked.
        // Must be positive: currentTime is the start of the block already being
        // rendered, so scheduling AT it means scheduling in the past, and the
        // envelope gets clipped by whatever is left of the block.
        start(t) { this.startedAt = t ?? 0; this.lead = (t ?? 0) - ctxNow(); },
        // Scheduling a source ALREADY books a stop at its natural end, so a
        // bare "was stop() called" boolean is true either way and proves
        // nothing. Keep every stop time: a cancel shows up as a second, EARLIER
        // stop than the one the keystroke booked.
        stop(t) { (this.stops ??= []).push(t ?? 0); },
      };
      if (kind === 'source' || kind === 'osc') scheduled.push(n);
      return n;
    };
    window.AudioContext = class {
      constructor() { this.state = 'running'; this.sampleRate = 48000; this.destination = node('dest'); }
      get currentTime() { return ctxNow(); }
      resume() {}
      createBuffer(ch, len) { return { getChannelData: () => new Float32Array(len) }; }
      createBufferSource() { return node('source'); }
      createOscillator() { return node('osc'); }
      createGain() { return node('gain'); }
      createBiquadFilter() { return node('filter'); }
    };
    window.__scheduled = scheduled;

    import { registerTerminals } from '../src/terminal/player.mjs';

    // Mock of the core engine: just collects providers (SPEC §2.4 surface).
    const providers = [];
    const MockDecklight = {
      registerBuildProvider(el, provider) { providers.push({ el, provider }); },
    };
    window.__providers = providers;

    const sleep = ms => new Promise(r => setTimeout(r, ms));
    const results = {};

    try {
      await registerTerminals(MockDecklight);
      const p = providers.find(x => x.el.id === 't-step')?.provider;
      results.providerCount = p?.count;
      results.labels = [p?.label(0), p?.label(2)];

      // idempotency drive: full -> back to 1 -> forward-animate to 2
      p.apply(3);
      const fullText = document.querySelector('#t-step .terminal-lines').innerText;
      results.fullHasAllCmds = ['echo "hello decklight"', 'orange256', 'multi'].every(s => fullText.includes(s));

      p.apply(1);
      const oneText = document.querySelector('#t-step .terminal-lines').innerText;
      results.step1HasFirst = oneText.includes('hello decklight');
      results.step1LacksSecond = !oneText.includes('orange256');

      p.apply(2); // single forward step -> animated (virtual time fast-forwards)
      await sleep(9_000); // generous for type+stream+settle, well under the budget
      const twoHtml = document.querySelector('#t-step .terminal-lines').innerHTML;
      results.step2Animated = twoHtml.includes('boldgreen');
      results.step2Colored = /ansi-fg-1/.test(twoHtml) && /ansi-bold/.test(twoHtml);
      results.step2Inline256 = /rgb\(255,135,0\)/.test(twoHtml); // xterm 208
      results.cursorPresent = twoHtml.includes('terminal-cursor');
      results.noEscapeLeak = !document.querySelector('#t-step').innerText.includes('');

      // play mode chrome
      results.playButtons = !!document.querySelector('#t-play .terminal-play') &&
        !!document.querySelector('#t-play .terminal-speed');

      // broken cast -> visible error panel, no throw (message varies by
      // origin: HTTP gives our "failed to load cast (404)", file:// gives
      // the browser's fetch TypeError — the ⚠ panel is the contract)
      results.errorPanel = document.querySelector('#t-missing').innerText.includes('⚠');

      // ---- feature cast: hidden step, sleep step, poster, interactive input
      const pf = providers.find(x => x.el.id === 't-feat')?.provider;
      // playable = 3 (hidden + sleep excluded); poster=1 -> provider count 2
      results.featProviderCount = pf?.count;
      const featText0 = document.querySelector('#t-feat .terminal-lines').innerText;
      results.featPosterShowsFirst = featText0.includes('one');
      results.featPosterHidesRest = !featText0.includes('welcome');
      pf.apply(2); // jump to full (instant path)
      const featText = document.querySelector('#t-feat .terminal-lines').innerText;
      results.featHiddenSkipped = !featText.includes('setup-ok');
      results.featInputMasked = featText.includes('▓▓▓');
      results.featOutputShown = featText.includes('welcome') && featText.includes('done');

      // ---- asciicast v2 import: markers -> steps; raw stream (no double prompt)
      const pi = providers.find(x => x.el.id === 't-import')?.provider;
      results.importProviderCount = pi?.count;
      pi.apply(2);
      const impText = document.querySelector('#t-import .terminal-lines').innerText;
      results.importPlays = impText.includes('Darwin') && impText.includes('imported');
      results.importNoDoublePrompt = !/\$ \$ /.test(impText);
      results.importColored = /ansi-fg-2/.test(document.querySelector('#t-import .terminal-lines').innerHTML);
      // play-mode import still gets timeline controls
      results.importPlayControls = !!document.querySelector('#t-import-plain .terminal-play');

      // --- typing speed: only the brisk presets, and changes land LIVE -------
      const slideEl = document.querySelector('#t-slide');
      const ctrl = slideEl._decklightTerminal;
      const wpmBtn = document.querySelector('#t-slide .terminal-typespeed');

      // the ⌨ picker cycles exactly the presets, and wraps
      const seen = [ctrl.typeWpm];
      wpmBtn.click(); seen.push(ctrl.typeWpm);
      wpmBtn.click(); seen.push(ctrl.typeWpm);   // wraps back to the first
      results.wpmPresets = JSON.stringify(seen) === JSON.stringify([120, 160, 120]);

      // the multiplier is recomputed per keystroke, so a mid-command change to
      // typeWpm is visible AT ONCE — not captured once at the start of a build
      const step0 = ctrl.playable[0];
      ctrl.typeWpm = 120; const f120 = ctrl._typeFactor(step0);
      ctrl.typeWpm = 160; const f160 = ctrl._typeFactor(step0);
      results.wpmLive = f160 > f120 && Math.abs(f160 / f120 - 160 / 120) < 1e-9;

      // --- leaving the slide stops the cast, and silences it AT ONCE ---------
      // apply() runs synchronously up to its first await, so one glyph is
      // painted and its key sounds are scheduled before we leave the slide.
      const ps = providers.find(x => x.el.id === 't-slide')?.provider;
      const mark = scheduled.length;
      ps.apply(1);                                  // start typing the command
      const made = scheduled.slice(mark);           // sources this keystroke booked
      document.querySelector('#s-slide').classList.remove('active');  // leave the slide
      await sleep(400);                             // ample time to have typed on

      results.leaveSchedulesSound = made.length > 0;
      // every source the keystroke booked was cut short: a second stop, earlier
      // than the natural end it was scheduled with
      results.leaveSilencesSound = made.every(n =>
        n.stops && n.stops.length >= 2 && n.stops[n.stops.length - 1] < n.stops[0]);

      // --- key sounds are booked AHEAD of the audio clock, never at it -------
      // Scheduling at currentTime lands in the block already being rendered, so
      // the attack ramp is skipped and the decay is clipped by a varying slice
      // of a render quantum — audible as jitter, worst on the shortest envelope
      // (clacky). Require at least a full quantum (2.7ms @48k) of lead.
      const QUANTUM = 128 / 48000;
      results.soundBookedAhead = made.every(n => n.lead > QUANTUM);
      const slideText = document.querySelector('#t-slide .terminal-lines').innerText;
      results.leaveStopsTyping = !slideText.includes('hello decklight');

      results.PASS = Object.entries(results).every(([k, v]) => k === 'PASS' || v === true ||
        (k === 'providerCount' && v === 3) || (k === 'featProviderCount' && v === 2) ||
        (k === 'importProviderCount' && v === 2) ||
        (k === 'labels' && v[0].includes('echo') && v[1].includes('multi')));
    } catch (e) {
      results.exception = String(e && e.stack || e);
      results.PASS = false;
    }
    document.getElementById('assert').textContent = 'DECKLIGHT-PLAYER-RESULTS ' + JSON.stringify(results, null, 1);
  </script>
</body>
</html>
