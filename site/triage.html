<!doctype html>
<!--
  The triage board: the ready-to-dev loop, seen from above.

  Five columns mirror an issue's life: unlabeled (triage) → `ready-to-dev`
  (queued) → `in-dev` (the loop is on it) → an open PR (in review) → closed.
  The board reads the public GitHub API, so it works logged-out, from
  decklight.io/triage.html or straight off the file system.

  With a token pasted in (repo scope, stored only in this browser's
  localStorage), cards drag between the first three columns — and dropping a
  card on "Ready to dev" applies the label that is the loop's trust gate, so
  that drag literally starts the robot.

  Like everything else here: one file, zero dependencies, no build step.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>decklight · triage</title>
<style>
  :root {
    --bg: #f6f7f9; --col: #ececf1; --card: #ffffff; --ink: #1c1e22;
    --muted: #6b7280; --line: #d8dbe2; --accent: #4c6ef5; --danger: #c92a2a;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #14161a; --col: #1d2026; --card: #262a31; --ink: #e8eaee;
      --muted: #9aa1ac; --line: #343943; --accent: #7b96ff; --danger: #ff8787;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font: 14px/1.45 system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  header {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    padding: 14px 20px; border-bottom: 1px solid var(--line);
  }
  header h1 { font-size: 16px; margin: 0; font-weight: 650; }
  header h1 a { color: inherit; text-decoration: none; }
  header .spacer { flex: 1; }
  header input {
    width: 260px; padding: 6px 9px; border: 1px solid var(--line);
    border-radius: 6px; background: var(--card); color: var(--ink); font: inherit;
  }
  header button {
    padding: 6px 12px; border: 1px solid var(--line); border-radius: 6px;
    background: var(--card); color: var(--ink); font: inherit; cursor: pointer;
  }
  header button:hover { border-color: var(--accent); }
  #status { color: var(--muted); font-size: 12.5px; }
  #status.error { color: var(--danger); }
  main {
    display: grid; grid-template-columns: repeat(5, minmax(230px, 1fr));
    gap: 12px; padding: 16px 20px; overflow-x: auto; align-items: start;
  }
  @media (max-width: 1100px) { main { grid-template-columns: repeat(5, 250px); } }
  .col { background: var(--col); border-radius: 10px; padding: 10px; min-height: 180px; }
  .col.drop { outline: 2px dashed var(--accent); outline-offset: -2px; }
  .col h2 {
    font-size: 12.5px; margin: 2px 4px 2px; font-weight: 650;
    text-transform: uppercase; letter-spacing: .04em;
    display: flex; align-items: baseline; gap: 7px;
  }
  .col h2 .count { color: var(--muted); font-weight: 500; }
  .col .hint { margin: 0 4px 10px; font-size: 12px; color: var(--muted); }
  .card {
    background: var(--card); border: 1px solid var(--line); border-radius: 8px;
    padding: 9px 11px; margin-bottom: 8px; display: block; color: inherit;
    text-decoration: none;
  }
  .card:hover { border-color: var(--accent); }
  .card[draggable="true"] { cursor: grab; }
  .card.dragging { opacity: .45; }
  .card .num { color: var(--muted); font-size: 12px; }
  .card .title { font-weight: 550; margin: 1px 0 6px; }
  .card .meta { display: flex; flex-wrap: wrap; gap: 5px; align-items: center; }
  .chip {
    font-size: 11px; padding: 1px 7px; border-radius: 99px;
    border: 1px solid var(--line); color: var(--muted);
  }
  .card .age { font-size: 11.5px; color: var(--muted); margin-left: auto; }
  .empty { color: var(--muted); font-size: 12.5px; padding: 6px 4px; }
</style>
</head>
<body>
<header>
  <h1><a href="https://github.com/decklight/decklight">decklight</a> · triage</h1>
  <span id="status">loading…</span>
  <span class="spacer"></span>
  <input id="token" type="password" autocomplete="off"
         placeholder="GitHub token (only needed to move cards)">
  <button id="refresh" type="button">refresh</button>
</header>
<main id="board"></main>

<script>
(() => {
  const API = 'https://api.github.com/repos/decklight/decklight';
  const COLS = [
    { id: 'triage', title: 'Triage', hint: 'no status label yet — needs a decision' },
    { id: 'ready',  title: 'Ready to dev', hint: 'labeled ready-to-dev: dropping a card here starts the loop', label: 'ready-to-dev' },
    { id: 'dev',    title: 'In dev', hint: 'labeled in-dev: the loop is implementing it', label: 'in-dev' },
    { id: 'review', title: 'In review', hint: 'PR open — merges itself when CI goes green' },
    { id: 'done',   title: 'Done', hint: 'recently closed' },
  ];
  const DRAGGABLE = ['triage', 'ready', 'dev'];
  const STATUS_LABELS = COLS.map(c => c.label).filter(Boolean);

  const board = document.getElementById('board');
  const statusEl = document.getElementById('status');
  const tokenEl = document.getElementById('token');
  tokenEl.value = localStorage.getItem('decklight-triage-token') || '';
  tokenEl.addEventListener('change', () => {
    localStorage.setItem('decklight-triage-token', tokenEl.value.trim());
    load();
  });
  document.getElementById('refresh').addEventListener('click', load);

  const say = (msg, isError) => {
    statusEl.textContent = msg;
    statusEl.className = isError ? 'error' : '';
  };

  async function gh(path, opts = {}) {
    const headers = { Accept: 'application/vnd.github+json' };
    const t = tokenEl.value.trim();
    if (t) headers.Authorization = 'Bearer ' + t;
    if (opts.body) headers['Content-Type'] = 'application/json';
    const r = await fetch(API + path, { ...opts, headers });
    if (!r.ok) throw new Error(`GitHub said ${r.status} for ${path.split('?')[0]}`);
    return r.status === 204 ? null : r.json();
  }

  const ago = iso => {
    const s = (Date.now() - new Date(iso)) / 1e3;
    if (s < 3600) return Math.max(1, s / 60 | 0) + 'm';
    if (s < 86400) return (s / 3600 | 0) + 'h';
    return (s / 86400 | 0) + 'd';
  };

  function columnOf(item) {
    if (item.pull_request) return item.state === 'open' ? 'review' : null;
    if (item.state === 'closed') return 'done';
    const names = item.labels.map(l => l.name);
    if (names.includes('in-dev')) return 'dev';
    if (names.includes('ready-to-dev')) return 'ready';
    return 'triage';
  }

  function card(item, colId) {
    const a = document.createElement('a');
    a.className = 'card';
    a.href = item.html_url;
    a.target = '_blank';
    a.rel = 'noopener';

    const num = document.createElement('div');
    num.className = 'num';
    num.textContent = '#' + item.number;
    const title = document.createElement('div');
    title.className = 'title';
    title.textContent = item.title;
    const meta = document.createElement('div');
    meta.className = 'meta';
    for (const l of item.labels) {
      if (STATUS_LABELS.includes(l.name)) continue;
      const chip = document.createElement('span');
      chip.className = 'chip';
      chip.textContent = l.name;
      meta.appendChild(chip);
    }
    const age = document.createElement('span');
    age.className = 'age';
    age.textContent = ago(item.updated_at) + (item.comments ? ` · ${item.comments}💬` : '');
    meta.appendChild(age);
    a.append(num, title, meta);

    if (DRAGGABLE.includes(colId) && tokenEl.value.trim()) {
      a.draggable = true;
      a.addEventListener('dragstart', e => {
        e.dataTransfer.setData('text/plain', JSON.stringify({ number: item.number, from: colId }));
        a.classList.add('dragging');
      });
      a.addEventListener('dragend', () => a.classList.remove('dragging'));
    }
    return a;
  }

  async function move(number, from, to) {
    if (from === to) return;
    say(`moving #${number}…`);
    const fromLabel = COLS.find(c => c.id === from).label;
    const toLabel = COLS.find(c => c.id === to).label;
    if (fromLabel) await gh(`/issues/${number}/labels/${encodeURIComponent(fromLabel)}`, { method: 'DELETE' });
    if (toLabel) await gh(`/issues/${number}/labels`, { method: 'POST', body: JSON.stringify({ labels: [toLabel] }) });
    await load();
  }

  function render(items) {
    board.textContent = '';
    for (const col of COLS) {
      const div = document.createElement('div');
      div.className = 'col';
      div.dataset.col = col.id;
      const h = document.createElement('h2');
      const inCol = items.filter(i => columnOf(i) === col.id);
      h.innerHTML = `${col.title} <span class="count">${inCol.length}</span>`;
      const hint = document.createElement('p');
      hint.className = 'hint';
      hint.textContent = col.hint;
      div.append(h, hint);
      if (!inCol.length) {
        const e = document.createElement('div');
        e.className = 'empty';
        e.textContent = 'nothing here';
        div.appendChild(e);
      }
      for (const item of inCol) div.appendChild(card(item, col.id));

      if (DRAGGABLE.includes(col.id)) {
        div.addEventListener('dragover', e => { e.preventDefault(); div.classList.add('drop'); });
        div.addEventListener('dragleave', () => div.classList.remove('drop'));
        div.addEventListener('drop', e => {
          e.preventDefault();
          div.classList.remove('drop');
          try {
            const { number, from } = JSON.parse(e.dataTransfer.getData('text/plain'));
            move(number, from, col.id).catch(err => say(err.message, true));
          } catch { /* not one of our cards */ }
        });
      }
      board.appendChild(div);
    }
  }

  async function load() {
    say('loading…');
    try {
      // /issues returns PRs too — that is how the review column gets filled
      const [open, closed] = await Promise.all([
        gh('/issues?state=open&per_page=100'),
        gh('/issues?state=closed&per_page=20&sort=updated&direction=desc'),
      ]);
      const items = [...open, ...closed.filter(i => !i.pull_request).slice(0, 10)];
      render(items.filter(i => columnOf(i)));
      const when = new Date().toLocaleTimeString();
      say(`${open.length} open · updated ${when}` +
          (tokenEl.value.trim() ? ' · drag cards to re-label' : ' · read-only without a token'));
    } catch (err) {
      say(err.message, true);
    }
  }

  load();
})();
</script>
</body>
</html>
